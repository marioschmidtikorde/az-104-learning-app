questions:
- id: AZ104-001
  language: en
  domain: Identity
  learning_path: Manage identities and governance
  topic: RBAC
  question: Which built-in Azure role provides the minimum permissions required to create and manage most resources in a resource group, but does not allow delegation of access?
  choices:
  - Reader
  - Contributor
  - Owner
  - User Access Administrator
  correct_answer_index: 1
  correct_answer: Contributor
  explanation: Contributor can create and manage resources but cannot grant access. Owner includes Contributor permissions plus the ability to manage access.
  source:
    title: 'AZ-104: Manage identities and governance in Azure'
    url: https://learn.microsoft.com/en-us/training/paths/az-104-manage-identities-governance/
- id: AZ104-002
  language: en
  domain: Identity
  learning_path: Manage identities and governance
  topic: RBAC
  question: Which Azure feature should you use to grant a user temporary, time-bound elevation to a privileged role such as Global Administrator or Privileged Role Administrator?
  choices:
  - Conditional Access
  - Privileged Identity Management
  - Management groups
  - Administrative units
  correct_answer_index: 1
  correct_answer: Privileged Identity Management
  explanation: Microsoft Entra Privileged Identity Management supports just-in-time and time-bound activation for privileged roles.
  source:
    title: 'AZ-104: Manage identities and governance in Azure'
    url: https://learn.microsoft.com/en-us/training/paths/az-104-manage-identities-governance/
- id: AZ104-003
  language: en
  domain: Identity
  learning_path: Manage identities and governance
  topic: Scopes
  question: At which scope can you assign Azure RBAC roles?
  choices:
  - Only at the subscription scope
  - Only at the resource group and resource scopes
  - At management group, subscription, resource group, and resource scopes
  - Only at the resource scope
  correct_answer_index: 2
  correct_answer: At management group, subscription, resource group, and resource scopes
  explanation: Azure RBAC assignments can be inherited down the hierarchy from management group to resource.
  source:
    title: 'AZ-104: Manage identities and governance in Azure'
    url: https://learn.microsoft.com/en-us/training/paths/az-104-manage-identities-governance/
- id: AZ104-004
  language: en
  domain: Identity
  learning_path: Manage identities and governance
  topic: Subscriptions and governance
  question: You need to ensure a standard tag is automatically added or remediated on resources that are missing it. Which Azure governance feature is designed for this?
  choices:
  - Azure Policy
  - Network Security Group
  - Resource lock
  - Azure Monitor
  correct_answer_index: 0
  correct_answer: Azure Policy
  explanation: Azure Policy can enforce standards and, with modify or deployIfNotExists effects, remediate noncompliant resources.
  source:
    title: 'AZ-104: Manage identities and governance in Azure'
    url: https://learn.microsoft.com/en-us/training/paths/az-104-manage-identities-governance/
- id: AZ104-005
  language: en
  domain: Identity
  learning_path: Manage identities and governance
  topic: Resource locks
  question: Which lock type prevents deletion of a resource but still allows updates to the resource configuration?
  choices:
  - ReadOnly
  - CanNotDelete
  - DeleteOnly
  - Immutable
  correct_answer_index: 1
  correct_answer: CanNotDelete
  explanation: A CanNotDelete lock blocks deletion but permits authorized modification. ReadOnly blocks both write and delete operations that require POST/PUT/PATCH/DELETE.
  source:
    title: 'AZ-104: Manage identities and governance in Azure'
    url: https://learn.microsoft.com/en-us/training/paths/az-104-manage-identities-governance/
- id: AZ104-006
  language: en
  domain: Identity
  learning_path: Manage identities and governance
  topic: Management groups
  question: What is the primary purpose of Azure management groups?
  choices:
  - To replicate resources across regions
  - To organize subscriptions for policy and access inheritance
  - To group virtual machines for availability
  - To isolate workloads at the network layer
  correct_answer_index: 1
  correct_answer: To organize subscriptions for policy and access inheritance
  explanation: Management groups let you apply governance controls such as RBAC and Azure Policy across multiple subscriptions.
  source:
    title: AZ-104 study guide
    url: https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/az-104
- id: AZ104-007
  language: en
  domain: Identity
  learning_path: Manage identities and governance
  topic: Conditional Access
  question: Which control is most appropriate when you need to require multifactor authentication for administrators accessing the Azure portal?
