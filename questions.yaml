    url: https://learn.microsoft.com/en-us/training/modules/configure-storage-accounts/
- id: AZ104-010
  language: en
  domain: Storage
  learning_path: Implement and manage storage in Azure
  topic: Storage accounts
  question: Which replication option is designed to keep data available even if a single datacenter in the primary region fails, without relying on a secondary region?
  choices:
  - LRS
  - ZRS
  - GRS
  - RA-GRS
  correct_answer_index: 1
  correct_answer: ZRS
  explanation: Zone-redundant storage synchronously replicates data across availability zones in the primary region.
  source:
    title: Configure Storage Accounts
    url: https://learn.microsoft.com/en-us/training/modules/configure-storage-accounts/
