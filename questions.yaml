  domain: Scalability
  learning_path: Scalability
  topic: App Service scaling
  question: In Azure App Service, what does scale out mean?
  choices:
  - Move the app to another region
  - Increase the number of app instances
  - Increase the size of a single VM
  - Enable backup retention
  correct_answer_index: 1
  correct_answer: Increase the number of app instances
  explanation: Scale out adds more running instances to handle additional load.
  source:
    title: Configure Azure App Service Plans
    url: https://learn.microsoft.com/en-us/training/modules/configure-app-service-plans/
- id: AZ104-041
  language: en
  domain: Scalability
  learning_path: Scalability
  topic: App Service plans
  question: Which feature allows an App Service plan to adjust instance count automatically based on rules or load?
  choices:
  - Resource locks
  - Autoscale
  - Management groups
  - Azure Policy
  correct_answer_index: 1
  correct_answer: Autoscale
  explanation: Autoscale evaluates conditions and adjusts instance count to meet demand while controlling cost.
  source:
    title: Configure Azure App Service Plans
    url: https://learn.microsoft.com/en-us/training/modules/configure-app-service-plans/
- id: AZ104-042
  language: en
  domain: Scalability
  learning_path: Scalability
  topic: VMSS
  question: Which Azure compute option is purpose-built to deploy and manage a set of identical, automatically scaling virtual machines?
  choices:
  - Availability sets
  - Virtual Machine Scale Sets
  - Azure Bastion
  - Dedicated hosts
  correct_answer_index: 1
  correct_answer: Virtual Machine Scale Sets
  explanation: Virtual Machine Scale Sets are designed for large-scale, identical VM fleets with autoscaling and orchestration.
  source:
    title: Configure Virtual Machine Availability
    url: https://learn.microsoft.com/en-us/training/modules/configure-virtual-machine-availability/
- id: AZ104-043
  language: en
  domain: Scalability
  learning_path: Scalability
  topic: Design choices
  question: A workload experiences unpredictable spikes in HTTP traffic. Which pattern is generally more resilient than increasing one VM to a larger size only?
  choices:
  - Vertical scaling only
  - Horizontal scaling behind a load balancer
  - Using a resource lock
  - Moving logs to archive
  correct_answer_index: 1
  correct_answer: Horizontal scaling behind a load balancer
  explanation: Horizontal scaling reduces single-instance dependency and usually improves elasticity for bursty traffic.
  source:
    title: Configure Virtual Machine Availability
    url: https://learn.microsoft.com/en-us/training/modules/configure-virtual-machine-availability/
- id: AZ104-044
  language: en
  domain: Scalability
  learning_path: Scalability
  topic: Availability zones
  question: Why can availability zones contribute to both resiliency and scale design?
  choices:
  - They remove the need for monitoring
  - They allow resources to be distributed across physically separate datacenters in a region
  - They replace RBAC
  - They store backups automatically
  correct_answer_index: 1
  correct_answer: They allow resources to be distributed across physically separate datacenters in a region
  explanation: Availability zones spread capacity and fault domains across separate datacenter locations in one region.
  source:
    title: Configure Virtual Machine Availability
    url: https://learn.microsoft.com/en-us/training/modules/configure-virtual-machine-availability/
