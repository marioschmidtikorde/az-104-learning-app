- id: AZ104-009
  language: en
  domain: Storage
  learning_path: Implement and manage storage in Azure
  topic: Storage accounts
  question: Which replication option keeps three synchronous copies in a single primary region and three additional copies in a paired secondary region?
  choices:
  - LRS
  - ZRS
  - GRS
  - GZRS
  correct_answer_index: 2
  correct_answer: GRS
  explanation: Geo-redundant storage uses LRS in the primary region plus asynchronous replication to a secondary region.
  source:
