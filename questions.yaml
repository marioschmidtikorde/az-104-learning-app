- id: AZ104-049
  language: en
  domain: Operational Awareness
  learning_path: Operational Awareness
  topic: Resilience operations
  question: Which practice most directly improves an administrator's ability to recover from accidental VM data loss?
  choices:
  - Rely only on role assignments
  - Implement and regularly validate backup and restore procedures
  - Increase subnet count
  - Disable diagnostic settings
  correct_answer_index: 1
  correct_answer: Implement and regularly validate backup and restore procedures
  explanation: Backups are only operationally reliable if restoration is also tested and understood.
