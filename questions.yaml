    url: https://learn.microsoft.com/en-us/training/paths/az-104-manage-identities-governance/
- id: AZ104-008
  language: en
  domain: Identity
  learning_path: Manage identities and governance
  topic: Groups
  question: Which group type in Microsoft Entra ID is specifically designed to grant access permissions to resources?
  choices:
  - Security group
  - Microsoft 365 group
  - Mail-enabled distribution group
