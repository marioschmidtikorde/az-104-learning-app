<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZ-104 Trainer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .card {
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    button {
      cursor: pointer;
      padding: 10px 14px;
    }
    .choices {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .choices button {
      text-align: left;
    }
    .muted {
      color: #57606a;
    }
    .ok {
      color: #1a7f37;
      font-weight: 700;
    }
    .bad {
      color: #cf222e;
      font-weight: 700;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>AZ-104 Trainer</h1>

  <div class="row">
    <label for="topicSelect">Topic</label>
    <select id="topicSelect">
      <option value="">All</option>
    </select>
    <button id="nextBtn">Next question</button>
  </div>

  <div class="card">
    <div class="muted">Status</div>
    <div id="status">Ready</div>
  </div>

  <div class="card">
    <div class="muted">Topic</div>
    <div id="topic">-</div>

    <h2 id="question">Press "Next question" to begin.</h2>

    <div id="choices" class="choices"></div>
  </div>

  <div class="card">
    <div class="muted">Result</div>
    <div id="result">-</div>
    <p id="explanation"></p>
    <div id="refs"></div>
  </div>

  <script>
    const topicSelect = document.getElementById("topicSelect");
    const nextBtn = document.getElementById("nextBtn");
    const statusEl = document.getElementById("status");
    const topicEl = document.getElementById("topic");
    const questionEl = document.getElementById("question");
    const choicesEl = document.getElementById("choices");
    const resultEl = document.getElementById("result");
    const explanationEl = document.getElementById("explanation");
    const refsEl = document.getElementById("refs");

    let currentQuestion = null;

    async function loadTopics() {
      const res = await fetch("/api/topics");
      const data = await res.json();

      for (const topic of data.topics) {
        const option = document.createElement("option");
        option.value = topic;
        option.textContent = topic;
        topicSelect.appendChild(option);
      }
    }

    async function nextQuestion() {
      resultEl.textContent = "-";
      explanationEl.textContent = "";
      refsEl.innerHTML = "";
      statusEl.textContent = "Loading...";

      const topic = topicSelect.value;
      const url = topic
        ? `/api/question?topic=${encodeURIComponent(topic)}`
        : "/api/question";

      const res = await fetch(url);

      if (!res.ok) {
        const error = await res.json();
        statusEl.textContent = error.error || "Failed to load question.";
        return;
      }

      currentQuestion = await res.json();
      topicEl.textContent = currentQuestion.topic;
      questionEl.textContent = currentQuestion.question;
      choicesEl.innerHTML = "";
      statusEl.textContent = "Question loaded.";

      currentQuestion.choices.forEach((choice, index) => {
        const btn = document.createElement("button");
        btn.textContent = choice;
        btn.onclick = () => submitAnswer(index);
        choicesEl.appendChild(btn);
      });
    }

    async function submitAnswer(choiceIndex) {
      if (!currentQuestion) return;

      const res = await fetch("/api/answer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id: currentQuestion.id,
          choiceIndex
        })
      });

      const data = await res.json();

      resultEl.textContent = data.correct ? "Correct" : "Incorrect";
      resultEl.className = data.correct ? "ok" : "bad";
      explanationEl.textContent = data.explanation || "";

      if (Array.isArray(data.refs) && data.refs.length) {
        const title = document.createElement("div");
        title.className = "muted";
        title.textContent = "References";
        refsEl.appendChild(title);

        const list = document.createElement("ul");
        for (const ref of data.refs) {
          const item = document.createElement("li");
          if (typeof ref === "string" && ref.startsWith("http")) {
            const link = document.createElement("a");
            link.href = ref;
            link.target = "_blank";
            link.rel = "noreferrer";
            link.textContent = ref;
            item.appendChild(link);
          } else {
            item.textContent = ref;
          }
          list.appendChild(item);
        }
        refsEl.appendChild(list);
      }
    }

    nextBtn.addEventListener("click", nextQuestion);

    loadTopics().catch((err) => {
      statusEl.textContent = `Failed to load topics: ${err.message}`;
    });
  </script>
</body>
</html>
